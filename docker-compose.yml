# Dokploy: create a Compose service (type Docker Compose, not Stack).
# Compose path: ./docker-compose.yml
# Set these in Dokploy Environment tab (written to .env automatically):
#   DHAN_CLIENT_ID, DHAN_ACCESS_TOKEN, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#
# No domain/Traefik needed — background scheduler only.
# manifest.json: edit in git, redeploy — synced to volume each start (SYNC_MANIFEST_FROM_REPO=1).
# Strategy configs live in dhan_algo_configs volume; set SYNC_STRATEGY_CONFIGS_FROM_REPO=1 to sync from git.
# Runtime-only edits: /app/data/manifest.json (set SYNC_MANIFEST_FROM_REPO=0 to keep them).

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      SYNC_MANIFEST_FROM_REPO: ${SYNC_MANIFEST_FROM_REPO:-1}
      SYNC_STRATEGY_CONFIGS_FROM_REPO: ${SYNC_STRATEGY_CONFIGS_FROM_REPO:-0}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - dhan_algo_data:/app/data
      - dhan_algo_cache:/app/.cache
      - dhan_algo_configs:/app/strategies/configs
    command: ["run-scheduler"]
    healthcheck:
      test: ["CMD", "run-scheduler", "--list"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 60s

networks:
  dokploy-network:
    external: true

volumes:
  dhan_algo_data:
  dhan_algo_cache:
  dhan_algo_configs:
