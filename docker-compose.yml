# Dokploy: Compose type Docker Compose (not Stack). Compose path: ./docker-compose.yml
# Set DHAN_CLIENT_ID, DHAN_PIN, DHAN_TOTP_SECRET (+ optional Telegram vars) in Environment tab.
# Strategy configs are edited via the dashboard (data/strategy_config volume) — no redeploy needed.

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      DHAN_PIN: ${DHAN_PIN}
      DHAN_TOTP_SECRET: ${DHAN_TOTP_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - dhan_algo_data:/app/data
      - dhan_algo_cache:/app/.cache
    command: ["run-scheduler"]
    healthcheck:
      test: ["CMD", "run-scheduler", "--list"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      DHAN_PIN: ${DHAN_PIN}
      DHAN_TOTP_SECRET: ${DHAN_TOTP_SECRET}
    volumes:
      - dhan_algo_data:/app/data
    command: ["run-dashboard", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/api/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dokploy-network:
    external: true

volumes:
  dhan_algo_data:
  dhan_algo_cache:
