# Dokploy: Compose type Docker Compose (not Stack). Compose path: ./docker-compose.yml
# Set DHAN_CLIENT_ID, DHAN_ACCESS_TOKEN (+ optional Telegram vars) in Environment tab.
# manifest.json + strategies/configs/*.json come from git on each deploy — edit locally, commit, redeploy.

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - dhan_algo_data:/app/data
      - dhan_algo_cache:/app/.cache
    command: ["run-scheduler"]
    healthcheck:
      test: ["CMD", "run-scheduler", "--list"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 60s

networks:
  dokploy-network:
    external: true

volumes:
  dhan_algo_data:
  dhan_algo_cache:
